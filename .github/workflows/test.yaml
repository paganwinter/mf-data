name: Test Workflow

run-name: Test - (${{ github.event.inputs.from_date || 'month start' }} - ${{ github.event.inputs.to_date || 'month end' }})

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'From Date (YYYY-MM-DD)'
        required: false
      to_date:
        description: 'To Date (YYYY-MM-DD)'
        required: false
      dry_run:
        description: 'Dry Run'
        required: false
        type: boolean
        default: false
      steps_download_parse:
        description: 'Run Download and Parse Step'
        required: false
        type: boolean
        default: true
      steps_process_navs:
        description: 'Run Process NAVs Step'
        required: false
        type: boolean
        default: true
      steps_update_stats:
        description: 'Run Update Stats Step'
        required: false
        type: boolean
        default: true
      commit_changes:
        description: 'Commit Changes'
        required: false
        type: boolean
        default: false

jobs:
  update-navs:
    name: Update NAVs from AMFI
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # - name: Install dependencies
      #   run: npm ci

      - name: Download and Parse NAVs
        if: ${{ github.event.inputs.steps_download_parse == 'true' }}
        run: |
          node scripts/update-navs.js download-parse --from-date=${{ github.event.inputs.from_date }} --to-date=${{ github.event.inputs.to_date }} --dry-run=${{ github.event.inputs.dry_run }}

      - name: Process NAVs
        if: ${{ github.event.inputs.steps_process_navs == 'true' }}
        run: |
          node scripts/update-navs.js process-navs --from-date=${{ github.event.inputs.from_date }} --to-date=${{ github.event.inputs.to_date }} --dry-run=${{ github.event.inputs.dry_run }}

      - name: Update Stats
        if: ${{ github.event.inputs.steps_update_stats == 'true' }}
        run: |
          node scripts/update-navs.js stats

      - name: Push changes
        if: ${{ github.event.inputs.commit_changes == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TODAY=$(date -u +"%Y-%m-%d")
            git commit -m "chore(nav): Update NAVs (manual) (${{ github.event.inputs.from_date || 'month start' }} - ${{ github.event.inputs.to_date || 'month end' }}) [skip ci]"
            git push
          fi
